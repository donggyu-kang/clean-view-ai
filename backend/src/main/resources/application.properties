spring.application.name=backend

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cleanviewai}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:cleanviewai-jwt-secret-key-minimum-256-bits-long-for-hs256-algorithm-2024}
jwt.expiration=86400000

# ── AI Engine ─────────────────────────────────────────────────────────────────
ai.engine.url=${AI_ENGINE_URL:http://localhost:8000}

# ── Jaeger Query ──────────────────────────────────────────────────────────────
jaeger.query.url=${JAEGER_QUERY_URL:http://localhost:16686}

# ── OpenTelemetry (OTLP) ─────────────────────────────────────────────────────
management.otlp.tracing.export.enabled=${OTEL_ENABLED:false}
management.otlp.tracing.endpoint=${OTEL_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=false

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
