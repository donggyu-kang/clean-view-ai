spring.application.name=backend

# H2 in-memory DB (개발용)
spring.datasource.url=jdbc:h2:mem:cleanviewai;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Flyway 비활성화 (PostgreSQL 전용 설정이라 H2와 충돌)
spring.flyway.enabled=false

# OpenTelemetry 비활성화 (로컬 수집기 없음)
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false

# Spring Security 디버그 (원인 파악 후 제거)
logging.level.org.springframework.security=TRACE

# JWT
jwt.secret=cleanviewai-jwt-secret-key-minimum-256-bits-long-for-hs256-algorithm-2024
jwt.expiration=86400000

# AI Engine
ai.engine.url=http://localhost:8000
