services:
  # ── PostgreSQL (pgvector) ────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    container_name: cleanview-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cleanviewai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Rust Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleanview-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cleanviewai}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret-key-at-least-32-bytes}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:8000}
      JAEGER_QUERY_URL: ${JAEGER_QUERY_URL:-http://jaeger:16686}
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy

  # ── AI Engine (FastAPI) ──────────────────────────────────────────────────
  ai-engine:
    build:
      context: ../ai-engine
      dockerfile: Dockerfile
    container_name: cleanview-ai-engine
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-cleanviewai}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (React) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cleanview-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
